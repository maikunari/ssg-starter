name: Keep Supabase Alive

on:
  schedule:
    # Every 3 days at 9am UTC (keeps free tier from pausing after 7 days inactivity)
    - cron: '0 9 */3 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "⏭️ SUPABASE_URL secret is not set. Skipping ping (expected in template repos)."
            exit 0
          fi
          
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase ping status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Unexpected status code: $STATUS"
            exit 1
          fi
          echo "✅ Supabase is alive"
