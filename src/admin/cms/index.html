<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS</title>
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url">
    <style>
      /* Customize Sveltia login page */

      /* Hide ALL logos - Sveltia default and any custom */
      svg.logo,
      img.logo,
      .logo,
      [class*="logo"] {
        display: none !important;
      }

      /* Hide the original h1 text completely and replace with custom text */
      h1 {
        visibility: hidden !important;
        position: relative !important;
        font-size: 0 !important;
      }
      h1::before {
        content: 'Sonic Engine';
        visibility: visible !important;
        font-size: 1.75rem;
        font-weight: 600;
        color: white;
        letter-spacing: 0.02em;
        display: block;
      }

      /* Style the login container background */
      .sui.sign-in,
      [class*="sign-in"] {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%) !important;
      }

      /* Style ONLY the sign-in page button (not the entire CMS) */
      .sui.sign-in button.primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;
        border: none !important;
        border-radius: 12px !important;
        padding: 14px 28px !important;
        font-weight: 600 !important;
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4) !important;
        transition: all 0.3s ease !important;
      }

      .sui.sign-in button.primary:hover {
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5) !important;
        transform: translateY(-2px);
      }

      /* Hide the logo img in admin sidebar - replaced by inline SVG via JS */
      .sui.button.iconic img.logo {
        display: none;
      }
    </style>
  </head>
  <body>
    <script>
      (function() {
        const TOKEN_KEY = 'sveltia-cms.user';

        // Get token from localStorage
        const userData = JSON.parse(localStorage.getItem(TOKEN_KEY) || '{}');
        const token = userData.token;

        if (!token) {
          // No token - tell parent to show login
          if (window.parent !== window) {
            window.parent.postMessage('needs-login', '*');
          }
        } else {
          // Has token - load Sveltia with manual init
          const script = document.createElement('script');
          script.src = 'https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js';
          script.onload = () => {
            // Sveltia will load config from the link tag
            // Token is already in localStorage in Sveltia's expected format
            // Just set up UI customizations
            setupLogoReplacement();
          };
          document.body.appendChild(script);

          // Watch for sign-out
          watchForSignOut();
        }

        // Replace sidebar logo with home icon
        function setupLogoReplacement() {
          const replaceLogoWithHomeIcon = () => {
            const logoImg = document.querySelector('.sui.button.iconic img.logo');
            if (logoImg) {
              const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
              svg.setAttribute('viewBox', '0 0 24 24');
              svg.setAttribute('width', '20');
              svg.setAttribute('height', '20');
              svg.setAttribute('fill', 'none');
              svg.setAttribute('stroke', 'currentColor');
              svg.setAttribute('stroke-width', '2');
              svg.setAttribute('stroke-linecap', 'round');
              svg.setAttribute('stroke-linejoin', 'round');
              svg.innerHTML = '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>';
              logoImg.parentNode.replaceChild(svg, logoImg);
            }
          };

          const observer = new MutationObserver((mutations, obs) => {
            if (document.querySelector('.sui.button.iconic img.logo')) {
              replaceLogoWithHomeIcon();
              obs.disconnect();
            }
          });
          observer.observe(document.body, { childList: true, subtree: true });
        }

        // Watch for sign-out (token removal)
        function watchForSignOut() {
          let lastToken = token;
          setInterval(() => {
            const currentData = JSON.parse(localStorage.getItem(TOKEN_KEY) || '{}');
            const currentToken = currentData.token;
            if (lastToken && !currentToken) {
              // Token was removed - notify parent
              if (window.parent !== window) {
                window.parent.postMessage('logout', '*');
              }
            }
            lastToken = currentToken;
          }, 1000);
        }
      })();
    </script>
  </body>
</html>
