backend:
  name: github
  repo: YOUR-USERNAME/ssg-starter  # Update with your GitHub repo
  branch: main

# Local development backend
local_backend: true

# For production deployment:
# - Set local_backend: false
# - Configure GitHub OAuth or use Sveltia CMS Authenticator
# Logo for the CMS interface - update this URL to your deployed site's logo
logo_url: /assets/images/logo-color.png

media_folder: "src/assets/images/blog"
public_folder: "/images/blog"

# Sveltia CMS built-in image optimizer
# Automatically optimizes images on upload (max 1920px, WebP format)
# Note: Thumbnail generation is handled by build-blog-images.js during build process
media_libraries:
  - name: default
    config:
      max_file_size: 5120000  # 5MB max file size
      transformations:
        raster_image:
          format: webp
          quality: 85
          width: 1920
          height: 1920
        svg:
          optimize: true

collections:
  - name: "blog"
    label: "Blog"
    label_singular: "Post"
    folder: "src/blog"
    create: true
    slug: "{{pageName}}"
    summary: "{{postTitle}}"
    fields:
      - {label: "Page Slug", name: "pageName", widget: "string", hint: "Used for the URL and image filename (no spaces, use dashes)"}
      - {label: "Post Title", name: "postTitle", widget: "string", hint: "Main heading shown on the page"}
      - {label: "SEO Title", name: "seoTitle", widget: "string", hint: "Title shown in Google search results"}
      - {label: "Excerpt", name: "excerpt", widget: "text", hint: "Short summary for blog listing page"}
      - {label: "Meta Description", name: "metaDescription", widget: "text", hint: "Description shown in Google search results", required: false}
      - label: "Author"
        name: "author"
        widget: "select"
        options:
          - {label: "Author One", value: "author-one"}
          - {label: "Author Two", value: "author-two"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Tags", name: "tags", widget: "list", default: ["post"]}
      - label: "Featured Image"
        name: "image"
        widget: "image"
        hint: "Upload image - will be automatically converted to WebP and resized (max 1920px, maintains aspect ratio)"
        choose_url: false
      - {label: "Image Alt Text", name: "imageAlt", widget: "string"}
      - {label: "Body", name: "body", widget: "markdown"}
