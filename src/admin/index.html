<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Manager</title>
    <style>
      /* ============================================
         Admin Shell Styles
         Handles auth and displays CMS in iframe
         ============================================ */

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        min-height: 100vh;
      }

      /* Loading screen */
      #loading-screen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a1a2e;
        color: rgba(255, 255, 255, 0.6);
        font-size: 1rem;
      }

      #loading-screen.hidden {
        display: none;
      }

      /* Login page container - hidden by default */
      #login-page {
        background-image: url('/images/landing-1200w.jpeg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        min-height: 100vh;
        display: none;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      #login-page.visible {
        display: flex;
      }

      /* Dark overlay */
      #login-page::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #082032;
        opacity: 0.7;
        z-index: 0;
      }

      /* Glassmorphism card */
      .login-card {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 24px;
        padding: 48px 40px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(30px);
        position: relative;
        z-index: 1;
        text-align: center;
        max-width: 400px;
        width: 90%;
      }

      @keyframes cardEntrance {
        to { opacity: 1; transform: translateY(0); }
      }

      /* Logo */
      .login-logo {
        width: 275px;
        max-width: 100%;
        height: auto;
        margin-bottom: 24px;
        filter: drop-shadow(0 4px 20px rgba(255, 255, 255, 0.2));
      }

      /* Login text */
      .login-text {
        color: rgba(255, 255, 255, 0.7);
        font-size: 1rem;
        margin-bottom: 32px;
        animation: fadeInUp 0.6s ease 0.3s forwards;
        opacity: 0;
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Primary button */
      .login-button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        border-radius: 12px;
        padding: 16px 32px;
        font-weight: 600;
        font-size: 1rem;
        letter-spacing: 0.02em;
        color: white;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        animation: buttonEntrance 0.6s ease 0.5s forwards;
        opacity: 0;
        width: 100%;
      }

      .login-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5), 0 0 40px rgba(102, 126, 234, 0.3);
      }

      .login-button:active {
        transform: translateY(0);
      }

      @keyframes buttonEntrance {
        to { opacity: 1; }
      }

      /* Error message */
      .login-error {
        color: #ff6b6b;
        font-size: 0.9rem;
        margin-top: 16px;
        display: none;
      }

      .login-error.show {
        display: block;
        animation: fadeInUp 0.3s ease forwards;
      }

      /* CMS iframe container */
      #cms-frame-container {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      #cms-frame-container.active {
        display: block;
      }

      #cms-frame {
        width: 100%;
        height: 100%;
        border: none;
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loading-screen">Loading...</div>

    <!-- Login Page -->
    <div id="login-page">
      <div class="login-card">
        <img src="/assets/images/logo-light.png" alt="Logo" class="login-logo">
        <p class="login-text">Sign in to manage your content</p>
        <button id="login-button" class="login-button">Sign In</button>
        <p id="login-error" class="login-error"></p>
      </div>
    </div>

    <!-- CMS iframe container -->
    <div id="cms-frame-container">
      <iframe id="cms-frame" src="" allow="clipboard-write"></iframe>
    </div>

    <script>
      (function() {
        // Configuration
        const AUTH_BASE_URL = 'https://sveltia-auth-proxy.mike-371.workers.dev';
        const TOKEN_KEY = 'sveltia-cms.user';

        // DOM elements
        const loadingScreen = document.getElementById('loading-screen');
        const loginPage = document.getElementById('login-page');
        const cmsFrameContainer = document.getElementById('cms-frame-container');
        const cmsFrame = document.getElementById('cms-frame');
        const loginButton = document.getElementById('login-button');
        const loginError = document.getElementById('login-error');

        // Parse token from URL hash
        function getTokenFromHash() {
          const hash = window.location.hash.substring(1);
          if (!hash) return null;

          const params = new URLSearchParams(hash);
          const token = params.get('auth_token');

          if (token) {
            return { token };
          }
          return null;
        }

        // Clear hash from URL
        function clearHash() {
          history.replaceState(null, '', window.location.pathname + window.location.search);
        }

        // Check for existing valid token in localStorage
        function getStoredToken() {
          try {
            const stored = localStorage.getItem(TOKEN_KEY);
            if (!stored) return null;

            const data = JSON.parse(stored);
            if (data.token) {
              return data.token;
            }
            return null;
          } catch (e) {
            localStorage.removeItem(TOKEN_KEY);
            return null;
          }
        }

        // Store token in Sveltia's expected format
        function storeToken(token) {
          const data = {
            backendName: 'github',
            token: token
          };
          localStorage.setItem(TOKEN_KEY, JSON.stringify(data));
        }

        // Show error message
        function showError(message) {
          loginError.textContent = message;
          loginError.classList.add('show');
        }

        // Show CMS iframe
        function showCMS() {
          loadingScreen.classList.add('hidden');
          loginPage.classList.remove('visible');
          cmsFrameContainer.classList.add('active');
          cmsFrame.src = '/admin/cms/';
        }

        // Show login page
        function showLoginPage() {
          loadingScreen.classList.add('hidden');
          cmsFrameContainer.classList.remove('active');
          loginPage.classList.add('visible');
          loginButton.addEventListener('click', redirectToAuth);
        }

        // Redirect to auth server
        function redirectToAuth() {
          const redirectUri = encodeURIComponent(window.location.origin + window.location.pathname);
          const authUrl = `${AUTH_BASE_URL}/auth?redirect_uri=${redirectUri}`;
          window.location.href = authUrl;
        }

        // Listen for messages from iframe
        window.addEventListener('message', (e) => {
          // Only accept messages from same origin
          if (e.origin !== window.location.origin) return;

          if (e.data === 'logout' || e.data === 'needs-login') {
            localStorage.removeItem(TOKEN_KEY);
            showLoginPage();
          }
        });

        // Listen for sign-out in other tabs
        window.addEventListener('storage', (e) => {
          if (e.key === TOKEN_KEY && !e.newValue) {
            showLoginPage();
          }
        });

        // Watch for same-tab sign-out
        function watchForSignOut() {
          let lastToken = getStoredToken();
          setInterval(() => {
            const currentToken = getStoredToken();
            if (lastToken && !currentToken) {
              showLoginPage();
            }
            lastToken = currentToken;
          }, 1000);
        }

        // Initialize
        function init() {
          // Step 1: Check for token in URL hash (returning from auth)
          const hashToken = getTokenFromHash();
          if (hashToken) {
            storeToken(hashToken.token);
            clearHash();
            showCMS();
            watchForSignOut();
            return;
          }

          // Step 2: Check for existing token in localStorage
          const storedToken = getStoredToken();
          if (storedToken) {
            showCMS();
            watchForSignOut();
            return;
          }

          // Step 3: No token found - show login page
          showLoginPage();
        }

        // Start
        init();
      })();
    </script>
  </body>
</html>
