<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sveltia CMS</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      /* Login page - keep the logo */
      .inner img.logo {
        content: url("/assets/images/logo-light.png");
        max-height: 60px !important;
        width: auto !important;
      }

      /* Login page - colorful gradient background */
      .container.svelte-7ua6x9,
      div[class*="container"]:has(.inner img.logo) {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 25%, #0f3460 50%, #533483 75%, #e94560 100%) !important;
        min-height: 100vh;
      }

      /* Hide the logo img in admin sidebar - replaced by inline SVG via JS */
      .sui.button.iconic img.logo {
        display: none;
      }
    </style>
  </head>
  <body>
    <!-- Sveltia CMS - Modern successor to Decap CMS with native drag-and-drop -->
    <script type="module" src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
    <script type="module">
      // Replace logo img with inline SVG home icon (matches other CMS icons)
      const replaceLogoWithHomeIcon = () => {
        const logoImg = document.querySelector('.sui.button.iconic img.logo');
        if (logoImg) {
          const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
          svg.setAttribute('viewBox', '0 0 24 24');
          svg.setAttribute('width', '20');
          svg.setAttribute('height', '20');
          svg.setAttribute('fill', 'none');
          svg.setAttribute('stroke', 'currentColor');
          svg.setAttribute('stroke-width', '2');
          svg.setAttribute('stroke-linecap', 'round');
          svg.setAttribute('stroke-linejoin', 'round');
          svg.innerHTML = '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>';
          logoImg.parentNode.replaceChild(svg, logoImg);
        }
      };

      // Run after CMS loads
      const observer = new MutationObserver((mutations, obs) => {
        if (document.querySelector('.sui.button.iconic img.logo')) {
          replaceLogoWithHomeIcon();
          obs.disconnect();
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });
    </script>
  </body>
</html>
